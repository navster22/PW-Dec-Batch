<!DOCTYPE html>
<html>
    <head>
        <title>Absolute position</title>
        <style>
            .main {
                width: 100px;
                height: 30px;
                background-color: blue;
                color: white;
                border-radius: 20px;
                position: relative;
                padding: 2px;
                text-align: center;
                align-content: center;
            }
            .child {
                width: 20px;
                height: 20px;
                background-color: red;
                border-radius: 50px;
                position: absolute;
                right: -5px;
                top: -5px;
            }
            .blog {
                width: 100%;
                height: 200px;
                border: 1px solid black;
                padding: 5px;
                overflow-y: hidden;
                overflow-x: auto;
                white-space: nowrap;
                background-color: yellow;
                position: absolute;
            }
            .card {
                width: 200px;
                height: 200px;
                background-color: red;
                display: inline-block;
                position: relative;
            }
            .blue {
                background-color: blue;
                z-index: -1;
            }
            .box {
                width: 50px;
                height: 50px;
                position: absolute;
            }
        </style>
    </head>
    <body>
       <div class="main">
        Messages
        <div class="child">3</div>
       </div>
       <div class="blog">
         <div class="card">
         </div>
         <div class="card">
         </div>
         <div class="card">
         </div>
         <div class="card">
         </div>
         <div class="card">
         </div>
         <div class="card">
         </div>
         <div class="card">
         </div>
         <div class="card">
         </div>
         <div class="card">
         </div>
         <div class="card">
         </div>
       </div>
        <div class="box blue"></div>
    </body>
</html>
